<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responder-Thinker Voice Agent</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --text: #e5e5e5;
            --text-muted: #737373;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        header .status {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.connected { background: var(--green); }
        .status-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
        .status-dot.error { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Transcript panel */
        .transcript {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .turn {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .turn.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
        }

        .turn.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .turn.system {
            align-self: center;
            color: var(--text-muted);
            font-size: 11px;
            font-style: italic;
        }

        .turn .domain-tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--accent-glow);
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Event log panel */
        .event-log {
            width: 360px;
            border-left: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            font-size: 11px;
        }

        .event-log h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .event {
            padding: 6px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            color: var(--text-muted);
            word-break: break-all;
        }

        .event.thinker {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .event.audio { color: var(--text-muted); opacity: 0.5; }
        .event.error { color: var(--red); }

        /* Controls */
        footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        button {
            padding: 10px 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        button:hover { border-color: var(--accent); }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        button.primary:hover { opacity: 0.9; }

        button.danger {
            border-color: var(--red);
            color: var(--red);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Audio visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 32px;
        }

        .visualizer .bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            transition: height 0.05s;
        }
    </style>
</head>
<body>
    <header>
        <h1>RESPONDER-THINKER</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <main>
        <div class="transcript" id="transcript">
            <div class="turn system">Click "Connect" to start a conversation.</div>
        </div>

        <div class="event-log" id="eventLog">
            <h2>Events</h2>
        </div>
    </main>

    <footer>
        <div class="visualizer" id="visualizer"></div>
        <button class="primary" id="connectBtn" onclick="connect()">Connect</button>
        <button class="danger" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
