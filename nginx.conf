server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time, not at startup. Without this, nginx crashes if the
    # backend container isn't up yet when nginx starts.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket connections to the backend
    location /ws/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
